<!DOCTYPE html>
<html>
<head>
<script>
(function(){
  "use strict";

  // Lee del parent (mismo dominio — allow-same-origin en sandbox de Streamlit)
  function parseCookies(){
    var o={};
    try{
      (window.parent.document.cookie||"").split(";").forEach(function(p){
        var i=p.indexOf("=");
        if(i<0)return;
        try{
          var k=decodeURIComponent(p.slice(0,i).trim());
          var v=decodeURIComponent(p.slice(i+1).trim());
          if(k)o[k]=v;
        }catch(e){}
      });
    }catch(e){}
    return o;
  }

  function setCookie(n,v,m){
    var s=encodeURIComponent(n)+"="+encodeURIComponent(v)+
          "; max-age="+m+"; path=/; SameSite=Lax";
    try{ window.parent.document.cookie=s; }catch(e){ document.cookie=s; }
  }

  function delCookie(n){
    var s=encodeURIComponent(n)+"=; max-age=0; path=/; SameSite=Lax";
    try{ window.parent.document.cookie=s; }catch(e){ document.cookie=s; }
  }

  function send(type,payload){
    window.parent.postMessage(Object.assign({type:type},payload),"*");
  }

  window.addEventListener("message",function(e){
    if(!e.data||e.data.type!=="streamlit:render")return;
    var a=e.data.args||{};
    if(a.action==="write"&&a.name) setCookie(a.name,a.value||"",a.max_age||604800);
    else if(a.action==="delete"&&a.name) delCookie(a.name);
    send("streamlit:setComponentValue",{value:{cookies:parseCookies()}});
  });

  send("streamlit:componentReady",{apiVersion:1});
  send("streamlit:setFrameHeight",{height:0});
})();
</script>
</head>
<body style="margin:0;padding:0;overflow:hidden;background:transparent;"></body>
</html>
